name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: d2r-vm-discord-controller

jobs:
  controller-image:
    name: Publish Controller Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/controller/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  windows-agent-zips:
    name: Build Windows Agent Zips
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish D2RAgent
        shell: pwsh
        run: |
          dotnet publish agents/D2RAgent/D2RAgent.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/D2RAgent
          Copy-Item samples/vm-agent.config.example.json artifacts/D2RAgent/
          Copy-Item scripts/install-vm-agent.ps1 artifacts/D2RAgent/
          Compress-Archive -Path artifacts/D2RAgent/* -DestinationPath artifacts/D2RAgent-win-x64.zip -Force

      - name: Publish HyperVAgent
        shell: pwsh
        run: |
          dotnet publish agents/HyperVAgent/HyperVAgent.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -o artifacts/HyperVAgent
          Copy-Item samples/hyperv-agent.config.example.json artifacts/HyperVAgent/
          Copy-Item scripts/install-hyperv-agent.ps1 artifacts/HyperVAgent/
          Compress-Archive -Path artifacts/HyperVAgent/* -DestinationPath artifacts/HyperVAgent-win-x64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-agent-zips
          path: artifacts/*.zip

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.zip
