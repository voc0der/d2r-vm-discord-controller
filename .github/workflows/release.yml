name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-zips:
    name: Build Windows Zips
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Publish D2RHost
        shell: pwsh
        env:
          HOST_EXE_NAME: ${{ vars.HOST_EXE_NAME }}
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME.TrimStart("v") } else { "0.0.0" }
          $publishArgs = @(
            "agents/D2RHost/D2RHost.csproj",
            "--configuration", "Release",
            "--runtime", "win-x64",
            "--self-contained", "true",
            "-p:PublishSingleFile=true",
            "-p:EnableCompressionInSingleFile=true",
            "-p:Version=$version",
            "-p:InformationalVersion=$version",
            "-o", "artifacts/D2RHost"
          )
          if (![string]::IsNullOrWhiteSpace($env:HOST_EXE_NAME)) {
            $publishArgs += "-p:HostExeName=$($env:HOST_EXE_NAME.Trim())"
          }
          dotnet publish @publishArgs
          Copy-Item samples/d2r-host.config.example.json artifacts/D2RHost/
          Copy-Item scripts/install-d2r-host.ps1 artifacts/D2RHost/
          Compress-Archive -Path artifacts/D2RHost/* -DestinationPath artifacts/D2RHost-win-x64.zip -Force

      - name: Publish D2RAgent
        shell: pwsh
        env:
          AGENT_EXE_NAME: ${{ vars.AGENT_EXE_NAME }}
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME.TrimStart("v") } else { "0.0.0" }
          $publishArgs = @(
            "agents/D2RAgent/D2RAgent.csproj",
            "--configuration", "Release",
            "--runtime", "win-x64",
            "--self-contained", "true",
            "-p:PublishSingleFile=true",
            "-p:EnableCompressionInSingleFile=true",
            "-p:Version=$version",
            "-p:InformationalVersion=$version",
            "-o", "artifacts/D2RAgent"
          )
          if (![string]::IsNullOrWhiteSpace($env:AGENT_EXE_NAME)) {
            $publishArgs += "-p:AgentExeName=$($env:AGENT_EXE_NAME.Trim())"
          }
          dotnet publish @publishArgs
          Copy-Item samples/vm-agent.config.example.json artifacts/D2RAgent/
          Copy-Item scripts/install-vm-agent.ps1 artifacts/D2RAgent/
          Compress-Archive -Path artifacts/D2RAgent/* -DestinationPath artifacts/D2RAgent-win-x64.zip -Force

      - name: Generate release notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $repo = "${{ github.repository }}"
          $isTag = $env:GITHUB_REF_TYPE -eq "tag"
          $tag = if ($isTag) { $env:GITHUB_REF_NAME } else { "manual-$env:GITHUB_RUN_NUMBER" }
          # --merged HEAD restricts this to tags that are actual ancestors of the commit being
          # built, not just whatever's numerically highest in the full repo-wide tag list. Without
          # it, a release whose own build is still running when a *later* tag gets pushed (two
          # tags pushed close together race their Release workflows) picks that later tag as its
          # "previous" release and computes a backwards compare/changelog showing no commits
          # (v0.2.106 hit this exact case from v0.2.107 landing while v0.2.106's build was still in
          # progress).
          $allTags = @(git tag --merged HEAD --sort=-v:refname)
          $previousTag = if ($isTag) { $allTags | Where-Object { $_ -ne $tag } | Select-Object -First 1 } else { $null }
          $range = if ($isTag -and $previousTag) { "$previousTag..$tag" } elseif ($isTag) { $tag } else { "HEAD" }
          $compareUrl = if ($isTag -and $previousTag) {
            "https://github.com/$repo/compare/$previousTag...$tag"
          } elseif ($isTag) {
            "https://github.com/$repo/commits/$tag"
          } else {
            "https://github.com/$repo/commit/${{ github.sha }}"
          }

          $groups = [ordered]@{
            "Features" = [System.Collections.Generic.List[string]]::new()
            "Fixes" = [System.Collections.Generic.List[string]]::new()
            "Documentation" = [System.Collections.Generic.List[string]]::new()
            "CI and Build" = [System.Collections.Generic.List[string]]::new()
            "Maintenance" = [System.Collections.Generic.List[string]]::new()
            "Other Changes" = [System.Collections.Generic.List[string]]::new()
          }

          function Format-Contributor([string]$name, [string]$email) {
            $trimmedName = $name.Trim()
            $normalizedName = $trimmedName.ToLowerInvariant()
            $normalizedEmail = $email.Trim().ToLowerInvariant()

            if ($normalizedName -eq "voc0der" -or $normalizedEmail -eq "contact@netspace.in") {
              return "[@voc0der](https://github.com/voc0der)"
            }

            if ($normalizedName -eq "dependabot[bot]") {
              return "[@dependabot[bot]](https://github.com/apps/dependabot)"
            }

            if ([string]::IsNullOrWhiteSpace($trimmedName)) {
              return "unknown"
            }

            return $trimmedName
          }

          $commitLines = @(git log --no-merges --pretty=format:"%H%x09%s%x09%an%x09%ae" $range)
          foreach ($line in $commitLines) {
            if ([string]::IsNullOrWhiteSpace($line)) {
              continue
            }

            $parts = $line -split "`t", 4
            $sha = $parts[0]
            $shortSha = $sha.Substring(0, 7)
            $subject = $parts[1]
            $author = Format-Contributor $parts[2] $parts[3]
            $entry = "- $subject ([$shortSha](https://github.com/$repo/commit/$sha)) by $author"

            $commitType = ""
            if ($subject -match "^(?<type>[a-z]+)(\([^)]+\))?!?:") {
              $commitType = $Matches["type"]
            }

            $section = "Other Changes"
            if ($commitType -eq "feat") {
              $section = "Features"
            } elseif ($commitType -eq "fix") {
              $section = "Fixes"
            } elseif ($commitType -eq "docs") {
              $section = "Documentation"
            } elseif ($commitType -in @("ci", "build")) {
              $section = "CI and Build"
            } elseif ($commitType -in @("chore", "refactor", "test", "perf", "revert")) {
              $section = "Maintenance"
            }

            $groups[$section].Add($entry)
          }

          $contributors = @(git log --format="%an%x09%ae" $range |
            ForEach-Object {
              $parts = $_ -split "`t", 2
              Format-Contributor $parts[0] $parts[1]
            } |
            Sort-Object -Unique)

          $notes = [System.Collections.Generic.List[string]]::new()
          $notes.Add("# $tag")
          $notes.Add("")
          $notes.Add("## Compare")
          $notes.Add("")
          $notes.Add("- $compareUrl")
          $notes.Add("")
          $notes.Add("## Changelog")
          $notes.Add("")

          foreach ($name in $groups.Keys) {
            if ($groups[$name].Count -eq 0) {
              continue
            }

            $notes.Add("### $name")
            $notes.Add("")
            foreach ($entry in $groups[$name]) {
              $notes.Add($entry)
            }
            $notes.Add("")
          }

          if ($commitLines.Count -eq 0) {
            $notes.Add("- No commits found in release range `$range`.")
            $notes.Add("")
          }

          $notes.Add("## Contributors")
          $notes.Add("")
          foreach ($contributor in $contributors) {
            $notes.Add("- $contributor")
          }
          $notes.Add("")
          $notes.Add("## Artifacts")
          $notes.Add("")
          $notes.Add("- D2RHost-win-x64.zip")
          $notes.Add("- D2RAgent-win-x64.zip")

          $notes | Set-Content -Path artifacts/release-notes.md -Encoding utf8
          Get-Content artifacts/release-notes.md

      - uses: actions/upload-artifact@v7
        with:
          name: windows-zips
          path: artifacts/*.zip

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: artifacts/release-notes.md
          files: artifacts/*.zip
